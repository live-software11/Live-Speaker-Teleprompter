<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">
    <title>R-Speaker Teleprompter Mobile</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="mobile-styles.css">
</head>
<body>
    <!-- Header Bar -->
    <div class="mobile-header">
        <button class="menu-btn" id="menuBtn">☰</button>
        <h1 class="app-title">R-Speaker</h1>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

    <!-- Main Teleprompter View -->
    <div class="teleprompter-container" id="teleprompterContainer">
        <div class="teleprompter-text" id="teleprompterText">
            <p>Welcome to R-Speaker Teleprompter Mobile</p>
            <p>Load or create a script to begin...</p>
        </div>
        
        <!-- Scroll Position Indicator -->
        <div class="scroll-indicator" id="scrollIndicator">
            <div class="scroll-progress"></div>
        </div>
    </div>

    <!-- Floating Control Panel -->
    <div class="floating-controls" id="floatingControls">
        <button class="control-btn play-btn" id="playBtn">
            <svg viewBox="0 0 24 24" class="play-icon">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <svg viewBox="0 0 24 24" class="pause-icon" style="display:none;">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
        </button>
        
        <div class="speed-control">
            <button class="speed-btn minus" id="speedDown">−</button>
            <span class="speed-value" id="speedValue">5</span>
            <button class="speed-btn plus" id="speedUp">+</button>
        </div>
        
        <button class="control-btn" id="resetBtn">⟲</button>
    </div>

    <!-- Side Menu -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <h2>Scripts</h2>
            <button class="close-menu" id="closeMenu">×</button>
        </div>
        
        <div class="script-list" id="scriptList">
            <!-- Scripts will be loaded here -->
        </div>
        
        <div class="menu-actions">
            <button class="menu-action-btn" id="newScriptBtn">
                <span>+</span> New Script
            </button>
            <button class="menu-action-btn" id="importBtn">
                <span>📁</span> Import
            </button>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="close-settings" id="closeSettings">×</button>
        </div>
        
        <div class="settings-content">
            <!-- Font Size -->
            <div class="setting-group">
                <label>Font Size</label>
                <div class="slider-container">
                    <input type="range" id="fontSizeSlider" min="20" max="100" value="32">
                    <span class="slider-value" id="fontSizeValue">32px</span>
                </div>
            </div>
            
            <!-- Text Color -->
            <div class="setting-group">
                <label>Text Color</label>
                <div class="color-options">
                    <button class="color-btn" data-color="#ffffff" style="background: #ffffff;"></button>
                    <button class="color-btn" data-color="#ffff00" style="background: #ffff00;"></button>
                    <button class="color-btn" data-color="#00ff00" style="background: #00ff00;"></button>
                    <button class="color-btn" data-color="#00ffff" style="background: #00ffff;"></button>
                </div>
            </div>
            
            <!-- Background -->
            <div class="setting-group">
                <label>Background</label>
                <div class="color-options">
                    <button class="bg-btn" data-bg="#000000" style="background: #000000;"></button>
                    <button class="bg-btn" data-bg="#1a1a1a" style="background: #1a1a1a;"></button>
                    <button class="bg-btn" data-bg="#0000ff" style="background: #0000ff;"></button>
                    <button class="bg-btn" data-bg="#00ff00" style="background: #00ff00;"></button>
                </div>
            </div>
            
            <!-- Mirror Mode -->
            <div class="setting-group">
                <label>Mirror Mode</label>
                <label class="switch">
                    <input type="checkbox" id="mirrorToggle">
                    <span class="slider round"></span>
                </label>
            </div>
            
            <!-- Line Height -->
            <div class="setting-group">
                <label>Line Spacing</label>
                <div class="slider-container">
                    <input type="range" id="lineHeightSlider" min="1" max="3" step="0.1" value="1.5">
                    <span class="slider-value" id="lineHeightValue">1.5</span>
                </div>
            </div>
            
            <!-- Remote Control -->
            <div class="setting-group">
                <label>Remote Control</label>
                <button class="connect-btn" id="connectBtn">Connect to Desktop</button>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Disconnected</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Editor Modal -->
    <div class="modal" id="scriptEditor">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="editorTitle">New Script</h2>
                <button class="modal-close" id="closeEditor">×</button>
            </div>
            
            <div class="modal-body">
                <input type="text" id="scriptTitle" placeholder="Script Title" class="script-title-input">
                <textarea id="scriptContent" placeholder="Enter your script here..." class="script-content-input"></textarea>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelEdit">Cancel</button>
                <button class="btn btn-primary" id="saveScript">Save</button>
            </div>
        </div>
    </div>

    <!-- Gesture Overlay -->
    <div class="gesture-overlay" id="gestureOverlay"></div>

    <!-- Connection Modal -->
    <div class="modal" id="connectionModal">
        <div class="modal-content compact">
            <div class="modal-header">
                <h2>Connect to Desktop</h2>
                <button class="modal-close" id="closeConnection">×</button>
            </div>
            
            <div class="modal-body">
                <div class="connection-method">
                    <h3>Scan QR Code</h3>
                    <div id="qrCode" class="qr-placeholder"></div>
                </div>
                
                <div class="divider">OR</div>
                
                <div class="connection-method">
                    <h3>Enter IP Address</h3>
                    <input type="text" id="ipInput" placeholder="192.168.1.100" class="ip-input">
                    <input type="number" id="portInput" placeholder="8080" value="8080" class="port-input">
                    <button class="btn btn-primary" id="connectManual">Connect</button>
                </div>
            </div>
        </div>
    </div>

    <script src="mobile-app.js"></script>
</body>
</html>
